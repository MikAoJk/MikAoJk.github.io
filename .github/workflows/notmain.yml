name: build 

on:
  push:
    branches:
      - '**'
      - '!main'

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Setup bun
        uses: oven-sh/setup-bun@v2
      - name: Install packages
        run: bun install
      - name: Build
        run: bun run build
